name: Test

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - run: npm test

  integration-root-path-passes:
    name: '[root-path] passes on all-pinned'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: |
          mkdir -p /tmp/proj
          echo '{"dependencies":{"foo":"1.0.0"},"devDependencies":{"bar":"2.3.4"}}' > /tmp/proj/package.json
      - uses: ./
        with:
          root-path: /tmp/proj

  integration-root-path-excludes-node-modules:
    name: '[root-path] ignores node_modules'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: |
          mkdir -p /tmp/proj/node_modules/foo
          echo '{"dependencies":{"a":"1.0.0"}}' > /tmp/proj/package.json
          echo '{"dependencies":{"b":"^9.9.9"}}' > /tmp/proj/node_modules/foo/package.json
      - uses: ./
        with:
          root-path: /tmp/proj

  integration-monorepo-passes:
    name: '[monorepo] passes when all packages are pinned'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: |
          mkdir -p /tmp/mono/packages/a /tmp/mono/packages/b
          echo '{"dependencies":{"foo":"1.0.0"}}' > /tmp/mono/packages/a/package.json
          echo '{"dependencies":{"bar":"2.0.0"}}' > /tmp/mono/packages/b/package.json
      - uses: ./
        with:
          root-path: /tmp/mono

  integration-monorepo-fails:
    name: '[monorepo] fails when one package has a range'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: |
          mkdir -p /tmp/mono/packages/a /tmp/mono/packages/b
          echo '{"dependencies":{"foo":"1.0.0"}}' > /tmp/mono/packages/a/package.json
          echo '{"dependencies":{"bar":"^2.0.0"}}' > /tmp/mono/packages/b/package.json
      - id: check
        uses: ./
        continue-on-error: true
        with:
          root-path: /tmp/mono
      - run: '[ "${{ steps.check.outcome }}" = "failure" ] || (echo "Expected failure, got ${{ steps.check.outcome }}" && exit 1)'

  integration-files-passes:
    name: '[files] passes on explicitly listed pinned files'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: |
          mkdir -p /tmp/proj/a /tmp/proj/b
          echo '{"dependencies":{"foo":"1.0.0"}}' > /tmp/proj/a/package.json
          echo '{"dependencies":{"bar":"2.0.0"}}' > /tmp/proj/b/package.json
      - uses: ./
        with:
          files: |
            /tmp/proj/a/package.json
            /tmp/proj/b/package.json

  integration-files-fails:
    name: '[files] fails on explicitly listed file with a range'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: |
          mkdir -p /tmp/proj
          echo '{"dependencies":{"foo":"^1.0.0"}}' > /tmp/proj/package.json
      - id: check
        uses: ./
        continue-on-error: true
        with:
          files: /tmp/proj/package.json
      - run: '[ "${{ steps.check.outcome }}" = "failure" ] || (echo "Expected failure, got ${{ steps.check.outcome }}" && exit 1)'

